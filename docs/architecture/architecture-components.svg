<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">AI Repo Analyst Component Architecture</title>
  <desc id="desc">Component view showing experience, orchestration, intelligence, persistence, and integration components.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { stroke: #27445d; stroke-width: 2; rx: 18; ry: 18; }
      .title { font: 700 32px Helvetica, Arial, sans-serif; fill: #183153; }
      .section { font: 700 22px Helvetica, Arial, sans-serif; fill: #183153; }
      .node-title { font: 700 17px Helvetica, Arial, sans-serif; fill: #183153; }
      .node-body { font: 400 14px Helvetica, Arial, sans-serif; fill: #39546d; }
      .caption { font: 400 15px Helvetica, Arial, sans-serif; fill: #4a627a; }
      .line { stroke: #27445d; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#27445d"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1100"/>

  <text class="title" x="90" y="70">AI Repo Analyst Component Architecture</text>
  <text class="caption" x="90" y="102">Presentation view of the main platform building blocks and how value flows through the system</text>

  <rect class="panel" x="70" y="140" width="300" height="170" fill="#d6e8f7"/>
  <text class="section" x="95" y="178">Experience Layer</text>
  <rect class="panel" x="95" y="200" width="250" height="82" fill="#ffffff"/>
  <text class="node-title" x="115" y="230">Web UI + FastAPI</text>
  <text class="node-body" x="115" y="255">Scan, compare, chat, patch, logs,</text>
  <text class="node-body" x="115" y="275">reports, file inspection, settings</text>

  <rect class="panel" x="430" y="140" width="420" height="410" fill="#fde4bd"/>
  <text class="section" x="455" y="178">Orchestration Layer</text>
  <rect class="panel" x="455" y="205" width="170" height="95" fill="#ffffff"/>
  <text class="node-title" x="475" y="235">App Context</text>
  <text class="node-body" x="475" y="260">Settings, stores,</text>
  <text class="node-body" x="475" y="280">runtime wiring</text>
  <rect class="panel" x="650" y="205" width="170" height="95" fill="#ffffff"/>
  <text class="node-title" x="670" y="235">Scan Orchestrator</text>
  <text class="node-body" x="670" y="260">End-to-end scan</text>
  <text class="node-body" x="670" y="280">and persistence</text>
  <rect class="panel" x="455" y="325" width="170" height="95" fill="#ffffff"/>
  <text class="node-title" x="475" y="355">Compare</text>
  <text class="node-body" x="475" y="380">Snapshot comparison</text>
  <text class="node-body" x="475" y="400">and trend view</text>
  <rect class="panel" x="650" y="325" width="170" height="95" fill="#ffffff"/>
  <text class="node-title" x="670" y="355">Chat</text>
  <text class="node-body" x="670" y="380">Grounded repo Q and A</text>
  <text class="node-body" x="670" y="400">over stored memory</text>
  <rect class="panel" x="455" y="445" width="170" height="80" fill="#ffffff"/>
  <text class="node-title" x="475" y="478">Patch</text>
  <text class="node-body" x="475" y="500">Patch suggestion flow</text>
  <rect class="panel" x="650" y="445" width="170" height="80" fill="#ffffff"/>
  <text class="node-title" x="670" y="478">Reporting</text>
  <text class="node-body" x="670" y="500">JSON, Markdown, HTML</text>

  <rect class="panel" x="900" y="140" width="500" height="700" fill="#d8f0d1"/>
  <text class="section" x="925" y="178">Intelligence Layer</text>
  <rect class="panel" x="925" y="205" width="205" height="100" fill="#ffffff"/>
  <text class="node-title" x="945" y="235">Repository Intake</text>
  <text class="node-body" x="945" y="260">Loader, file inventory, git,</text>
  <text class="node-body" x="945" y="280">language and dependency detection</text>
  <rect class="panel" x="1160" y="205" width="215" height="100" fill="#ffffff"/>
  <text class="node-title" x="1180" y="235">Code Analysis</text>
  <text class="node-body" x="1180" y="260">Tree-sitter, legacy AST,</text>
  <text class="node-body" x="1180" y="280">optional semantic enrichment</text>
  <rect class="panel" x="925" y="335" width="205" height="100" fill="#ffffff"/>
  <text class="node-title" x="945" y="365">Structural Memory</text>
  <text class="node-body" x="945" y="390">Symbols, code units, chunks,</text>
  <text class="node-body" x="945" y="410">embedding vectors</text>
  <rect class="panel" x="1160" y="335" width="215" height="100" fill="#ffffff"/>
  <text class="node-title" x="1180" y="365">Retrieval + Evidence</text>
  <text class="node-body" x="1180" y="390">Local ranking, evidence packs,</text>
  <text class="node-body" x="1180" y="410">cache keys, focus batching</text>
  <rect class="panel" x="925" y="465" width="205" height="100" fill="#ffffff"/>
  <text class="node-title" x="945" y="495">Risk + Drift</text>
  <text class="node-body" x="945" y="520">Diffs, deltas, trends,</text>
  <text class="node-body" x="945" y="540">architectural change signals</text>
  <rect class="panel" x="1160" y="465" width="215" height="100" fill="#ffffff"/>
  <text class="node-title" x="1180" y="495">LLM Workflows</text>
  <text class="node-body" x="1180" y="520">Finding generation, repo chat,</text>
  <text class="node-body" x="1180" y="540">patch suggestions, judging</text>
  <rect class="panel" x="925" y="595" width="450" height="120" fill="#ffffff"/>
  <text class="node-title" x="945" y="625">Strategic Product Core</text>
  <text class="node-body" x="945" y="650">Transforms raw repositories into durable, queryable, evidence-backed intelligence</text>
  <text class="node-body" x="945" y="672">that powers explainable AI review rather than one-shot scanning.</text>

  <rect class="panel" x="430" y="620" width="420" height="220" fill="#e8ddf8"/>
  <text class="section" x="455" y="658">Persistence Layer</text>
  <rect class="panel" x="455" y="685" width="340" height="120" fill="#ffffff"/>
  <text class="node-title" x="475" y="715">SQLite Snapshot Store</text>
  <text class="node-body" x="475" y="740">Repositories, snapshots, files, findings,</text>
  <text class="node-body" x="475" y="762">symbols, chunks, vectors, reviews, chat, patches, settings</text>

  <rect class="panel" x="1450" y="140" width="280" height="430" fill="#f6d8cf"/>
  <text class="section" x="1475" y="178">Integration Layer</text>
  <rect class="panel" x="1475" y="205" width="230" height="70" fill="#ffffff"/>
  <text class="node-title" x="1495" y="235">Filesystem + Git</text>
  <text class="node-body" x="1495" y="258">Local repo and SCM context</text>
  <rect class="panel" x="1475" y="295" width="230" height="70" fill="#ffffff"/>
  <text class="node-title" x="1495" y="325">Tree-sitter + LSP</text>
  <text class="node-body" x="1495" y="348">Optional structural and semantic tools</text>
  <rect class="panel" x="1475" y="385" width="230" height="70" fill="#ffffff"/>
  <text class="node-title" x="1495" y="415">LLM Providers</text>
  <text class="node-body" x="1495" y="438">Gemini, OpenRouter, OpenAI-compatible</text>
  <rect class="panel" x="1475" y="475" width="230" height="70" fill="#ffffff"/>
  <text class="node-title" x="1495" y="505">Report Export</text>
  <text class="node-body" x="1495" y="528">JSON, Markdown, HTML outputs</text>

  <path class="line" d="M345 242 L428 242"/>
  <path class="line" d="M850 350 L898 350"/>
  <path class="line" d="M850 735 L428 735"/>
  <path class="line" d="M1400 280 L1448 280"/>
  <path class="line" d="M1400 520 L1448 420"/>
  <path class="line" d="M590 550 L590 618"/>
  <path class="line" d="M1268 565 L1268 618"/>

  <text class="caption" x="90" y="1038">Core message: thin experience layer, strong orchestration boundary, reusable intelligence core, and durable snapshot memory.</text>
</svg>
